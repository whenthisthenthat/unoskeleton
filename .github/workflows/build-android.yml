name: Build Android APK

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version for the release (e.g., 1.0.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache node_modules
        id: node-cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.node-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Run tests with coverage
        run: npx jest --coverage --coverageReporters=json-summary --coverageReporters=text

      - name: Post coverage comment
        if: always() && steps.*.outcome != 'skipped'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            STMTS=$(node -p "require('./coverage/coverage-summary.json').total.statements.pct")
            BRANCH=$(node -p "require('./coverage/coverage-summary.json').total.branches.pct")
            FUNCS=$(node -p "require('./coverage/coverage-summary.json').total.functions.pct")
            LINES=$(node -p "require('./coverage/coverage-summary.json').total.lines.pct")

            BODY=$(cat <<EOF
          ## Test Coverage

          | Category | Coverage |
          |----------|----------|
          | Statements | ${STMTS}% |
          | Branches | ${BRANCH}% |
          | Functions | ${FUNCS}% |
          | Lines | ${LINES}% |
          EOF
          )
          else
            BODY="## Test Coverage\n\nCoverage report not available."
          fi

          gh api \
            repos/${{ github.repository }}/commits/${{ github.sha }}/comments \
            -f body="$BODY"

  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Cache node_modules
        id: node-cache-build
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.node-cache-build.outputs.cache-hit != 'true'
        run: npm ci

      - name: Cache expo prebuild
        id: prebuild-cache
        uses: actions/cache@v4
        with:
          path: android
          key: prebuild-${{ runner.os }}-${{ hashFiles('package-lock.json', 'app.json', 'app.config.ts') }}

      - name: Generate native Android project
        if: steps.prebuild-cache.outputs.cache-hit != 'true'
        run: npx expo prebuild --platform android --no-install
        env:
          DROPBOX_APP_KEY: ${{ secrets.DROPBOX_APP_KEY }}

      - name: Decode keystore
        if: ${{ env.HAS_KEYSTORE == 'true' }}
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore
        env:
          HAS_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}

      - name: Inject release signing config
        if: ${{ env.HAS_KEYSTORE == 'true' }}
        env:
          HAS_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          node -e "
          const fs = require('fs');
          const filepath = 'android/app/build.gradle';
          let content = fs.readFileSync(filepath, 'utf8');

          content = content.replace(
            'signingConfigs {',
            \`signingConfigs {
              release {
                  storeFile file('release.keystore')
                  storePassword System.getenv('KEYSTORE_PASSWORD')
                  keyAlias System.getenv('KEY_ALIAS')
                  keyPassword System.getenv('KEY_PASSWORD')
              }\`
          );

          content = content.replace(
            /release\s*\{[^}]*signingConfig\s+signingConfigs\.debug/s,
            (match) => match.replace('signingConfigs.debug', 'signingConfigs.release')
          );

          fs.writeFileSync(filepath, content);
          "

      - name: Setup Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
            android/app/.cxx
            android/app/build
          key: gradle-${{ runner.os }}-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties', 'android/**/*.gradle') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Build release APK
        working-directory: android
        run: ./gradlew app:assembleRelease --build-cache -PreactNativeArchitectures=arm64-v8a
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          GRADLE_OPTS: >-
            -Xmx4g
            -XX:MaxMetaspaceSize=512m
            -Dorg.gradle.caching=true
            -Dorg.gradle.vfs.watch=false

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ] && [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            PKG_VERSION=$(node -p "require('./package.json').version")
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
            VERSION="${PKG_VERSION}-${SHORT_SHA}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Rename APK
        run: |
          mv android/app/build/outputs/apk/release/app-release.apk \
             android/app/build/outputs/apk/release/unoskeleton-${{ steps.version.outputs.version }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: unoskeleton-apk
          path: android/app/build/outputs/apk/release/unoskeleton-${{ steps.version.outputs.version }}.apk
          retention-days: 5

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: UnoSkeleton ${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: android/app/build/outputs/apk/release/unoskeleton-${{ steps.version.outputs.version }}.apk

      - name: Post release comment
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RELEASE_URL="${{ steps.create_release.outputs.url }}"
          VERSION="${{ steps.version.outputs.version }}"
          APK_NAME="unoskeleton-${VERSION}.apk"

          BODY=$(cat <<EOF
          ## Release

          **[UnoSkeleton ${VERSION}](${RELEASE_URL})** published.

          Download: [${APK_NAME}](${RELEASE_URL}/${APK_NAME})
          EOF
          )

          gh api \
            repos/${{ github.repository }}/commits/${{ github.sha }}/comments \
            -f body="$BODY"
